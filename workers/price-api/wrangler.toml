name = "kimp-price-api"
main = "src/index.ts"
compatibility_date = "2026-04-18"
workers_dev = true
preview_urls = false

[[routes]]
pattern = "api.kimpboard.com"
custom_domain = true

[vars]
CACHE_TTL = "3"
# MACRO_API_TOKEN 은 Cloudflare encrypted secret 으로만 관리 (`wrangler secret put MACRO_API_TOKEN`
# 또는 CF 대시보드 → kimp-price-api → Settings → Variables and Secrets → Encrypted).
# 이 토큰이 미설정이면 /api/macro-summary, /api/realestate-weekly 의 POST 가 차단됩니다.

[[kv_namespaces]]
binding = "MACRO_KV"
id = "1f68912d3b0f44a0b9b7a7add115c769"
